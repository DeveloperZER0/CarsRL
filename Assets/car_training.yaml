# ============================================================
# ML-Agents PPO Training Config - Car Obstacle Course
# Algorytm: PPO (Proximal Policy Optimization)
# 
# UŻYCIE:
#   mlagents-learn config/car_training.yaml --run-id=CarRun01
#   mlagents-learn config/car_training.yaml --run-id=CarRun02 --resume
#
# WYMAGANIA:
#   pip install mlagents torch
#   (Python 3.9-3.10, PyTorch 2.0+)
# ============================================================

behaviors:
  CarDriver:  # Musi zgadzać się z "Behavior Name" w BehaviorParameters w Unity!
    trainer_type: ppo  # PPO - najlepsza opcja dla ciągłych akcji jazdy

    # ──────────────────────────────────────────────────────
    # HIPERPARAMETRY PPO
    # ──────────────────────────────────────────────────────
    hyperparameters:
      # Rozmiar batcha do uczenia sieci
      # Większy batch = stabilniejsze uczenie, wolniejsze
      batch_size: 512

      # Ile kroków zbieramy przed każdą aktualizacją wag
      # Dla 10 agentów = 10 * buffer_size kroków łącznie
      buffer_size: 4096

      # Szybkość uczenia sieci
      # 3e-4 = 0.0003 (standardowe dla PPO)
      learning_rate: 3.0e-4

      # Ile razy trenujemy na każdym zebranym batchu
      num_epoch: 3

      # Współczynnik epsilon - ogranicza jak mocno zmienia się polityka
      # 0.2 = standardowe, mniejsze = ostrożniejsze zmiany
      epsilon: 0.2

      # Siła regularyzacji (zapobiega przeuczeniu)
      lambd: 0.95

      # Harmonogram zmiany learning rate
      # linear = maleje liniowo do zera przez trening
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear

      # ────────────────────────────────────────────────────
      # ENTROPY (eksploracja)
      # ────────────────────────────────────────────────────
      # Beta kontroluje entropię (losowość akcji)
      # Wyższa beta = więcej eksploracji, niższa = bardziej deterministyczna polityka
      # PPO automatycznie ją obniża podczas treningu
      beta: 5.0e-3

    # ──────────────────────────────────────────────────────
    # ARCHITEKTURA SIECI NEURONOWEJ
    # ──────────────────────────────────────────────────────
    network_settings:
      # Typ sieci: simple = FC, nature_cnn/resnet (tylko dla obrazów)
      vis_encode_type: simple

      # Liczba neuronów w każdej ukrytej warstwie
      # 128 - dobry kompromis między mocą a szybkością
      hidden_units: 128

      # Liczba ukrytych warstw
      num_layers: 2

      # Normalizacja wejść - ZAWSZE true dla raycastów
      normalize: true

      # Czy używać pamięci (LSTM) - false dla prostej jazdy
      memory: null

    # ──────────────────────────────────────────────────────
    # PARAMETRY NAGRODY I WARTOŚCI
    # ──────────────────────────────────────────────────────
    reward_signals:
      extrinsic:  # Nagrody z naszej funkcji reward w CarAgent.cs
        gamma: 0.99       # Discount factor - jak daleko agent "widzi" w przyszłość
        strength: 1.0     # Mnożnik nagród zewnętrznych

      # OPCJONALNIE: Dodaj ciekawość dla eksploracji (odkomentuj jeśli agent się nie porusza)
      # curiosity:
      #   gamma: 0.99
      #   strength: 0.02    # Małe - żeby nie zdominowało nagród zewnętrznych
      #   encoding_size: 64
      #   learning_rate: 3.0e-4

    # ──────────────────────────────────────────────────────
    # PARAMETRY TRENINGU
    # ──────────────────────────────────────────────────────

    # Ile kroków (step = 1 FixedUpdate) trenować łącznie
    # Przy 10 agentach: 2M kroków = ~200k kroków/agenta
    # Zacznij od 2M, zwiększ do 5-10M dla lepszych wyników
    max_steps: 2000000

    # Co ile kroków zapisywać checkpointy modelu
    checkpoint_interval: 100000

    # Co ile kroków wyświetlać statystyki w konsoli
    summary_freq: 10000

    # Co ile kroków aktualizować statystyki
    time_horizon: 64

    # ──────────────────────────────────────────────────────
    # SELF-PLAY (opcjonalne, dla trybu wieloagentowego)
    # ──────────────────────────────────────────────────────
    # self_play:
    #   save_steps: 50000
    #   team_change: 100000

# ──────────────────────────────────────────────────────────
# UWAGI:
#
# Podczas treningu uruchom TensorBoard żeby śledzić postępy:
#   tensorboard --logdir results/
#   Otwórz: http://localhost:6006
#
# Kluczowe metryki do obserwowania:
#   - Episode Reward (rosnące = dobrze!)
#   - Episode Length (stabilizuje się gdy agent uczy się trasy)
#   - Policy Loss (powinno być małe i stabilne)
#   - Value Loss (powinno maleć z czasem)
#
# Jeśli agent się nie uczy:
#   1. Sprawdź czy Behavior Name = "CarDriver" w Unity
#   2. Zmniejsz learning_rate do 1e-4
#   3. Zwiększ buffer_size do 8192
#   4. Dodaj curiosity reward (odkomentuj wyżej)
# ──────────────────────────────────────────────────────────
