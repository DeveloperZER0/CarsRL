behaviors:
  CarDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 8192
      learning_rate: 3.0e-4
      num_epoch: 3
      epsilon: 0.2
      lambd: 0.95
      beta: 8.0e-3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      vis_encode_type: simple
      hidden_units: 256
      num_layers: 2
      normalize: true
      memory: null
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 5000000
    checkpoint_interval: 100000
    summary_freq: 10000
    time_horizon: 256